name: Backend CI

on:
  push:
    branches: ["main"]
    paths:
      - "backend/**"
  pull_request:
    branches: ["main"]
    paths:
      - "backend/**"

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: yes
          MYSQL_DATABASE: campusloop_testing
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_mysql, redis, bcmath, pcntl
          coverage: none

      - name: Install Dependencies
        run: |
          cd backend
          composer install -q --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: Copy .env
        run: |
          cd backend
          php -r "file_exists('.env') || copy('.env.example', '.env');"

      - name: Generate key
        run: |
          cd backend
          php artisan key:generate

      - name: Run Pint Check
        run: |
          cd backend
          vendor/bin/pint --test

      - name: Run PHPStan
        run: |
          cd backend
          vendor/bin/phpstan analyse

      - name: Run Pest Tests
        run: |
          cd backend
          php artisan migrate --force
          vendor/bin/pest
        env:
          DB_CONNECTION: mysql
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: campusloop_testing
          DB_USERNAME: root
          DB_PASSWORD: ""
          REDIS_HOST: 127.0.0.1
          CACHE_STORE: redis
