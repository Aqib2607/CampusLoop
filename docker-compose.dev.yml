services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    command: npm run dev
    ports:
      - "5173:5173"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - VITE_API_URL=http://localhost:8080/api/v1
    depends_on:
      - backend

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: php artisan serve --host=0.0.0.0 --port=8080
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - REDIS_HOST=redis
      - CACHE_STORE=redis
      - QUEUE_CONNECTION=redis
      - SESSION_DRIVER=redis
      - REVERB_HOST="0.0.0.0"
      - REVERB_PORT=8081
    depends_on:
      - db
      - redis

  queue:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: php artisan queue:listen
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      - backend
      - redis

  reverb:
    build:
      context: .
      dockerfile: Dockerfile.backend
    command: php artisan reverb:start --host=0.0.0.0 --port=8081
    ports:
      - "8081:8081"
    volumes:
      - ./backend:/var/www
    environment:
      - APP_ENV=local
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - REDIS_HOST=redis
    depends_on:
      - backend
      - redis

  db:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_DATABASE=campusloop_dev
      - MYSQL_ROOT_PASSWORD=secret
    volumes:
      - dev_db_data:/var/lib/mysql

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"

volumes:
  dev_db_data:
